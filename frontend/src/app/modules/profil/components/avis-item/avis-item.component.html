<div class="avis-card">
  <div class="avis-header">
    <div class="avis-avatar">{{ (avis.acheteur_nom || '?').charAt(0) | uppercase }}</div>
    <div>
      <p class="avis-author">{{ avis.acheteur_nom }}</p>
      <p class="avis-annonce">{{ avis.annonce_title }}</p>
    </div>
    <div class="avis-stars">
      <span *ngFor="let s of avis.stars" class="star">★</span>
      <span *ngFor="let s of [].constructor(5 - avis.note)" class="star empty">★</span>
    </div>
  </div>
  <p class="avis-comment">{{ avis.commentaire }}</p>
  <span class="avis-date">{{ avis.created_at | date:'dd/MM/yyyy' }}</span>
</div>
