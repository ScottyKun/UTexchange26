<main class="list-page">

  <!-- Barre de filtres -->
  <div class="filter-bar">
    <div class="filter-search">
      <input type="text" [(ngModel)]="searchInput" placeholder="Rechercher…"
             (keyup.enter)="applySearch()"/>
      <button (click)="applySearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>

    <select (change)="applyFilter('type', $any($event.target).value)">
      <option *ngFor="let t of types" [value]="t.value"
              [selected]="filters.type === t.value">{{ t.label }}</option>
    </select>

    <select (change)="applyFilter('cat_id', $any($event.target).value)">
      <option value="">Toutes catégories</option>
      <option *ngFor="let c of categories" [value]="c.id"
              [selected]="filters.cat_id === c.id">{{ c.nom }}</option>
    </select>
  </div>

  <!-- Loader -->
  <div *ngIf="loading" class="loader-wrap">
    <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
  </div>

  <!-- Erreur -->
  <div *ngIf="errorMsg && !loading" class="empty-state">
    <i class="fa-solid fa-triangle-exclamation"></i>
    <p>{{ errorMsg }}</p>
  </div>

  <!-- Grille -->
  <div *ngIf="!loading && annonces.length > 0" class="annonces-grid">
    <app-annonce-item
      *ngFor="let a of annonces"
      [annonce]="a"
      [isFavori]="isFavori(a.id)"
      (toggleFavori)="onToggleFavori($event)">
    </app-annonce-item>
  </div>

  <!-- Vide -->
  <div *ngIf="!loading && annonces.length === 0 && !errorMsg" class="empty-state">
    <i class="fa-solid fa-box-open fa-2x"></i>
    <p>Aucune annonce trouvée</p>
    <a routerLink="/annonces/new/create" class="btn-cta">Publier la première</a>
  </div>

</main>
