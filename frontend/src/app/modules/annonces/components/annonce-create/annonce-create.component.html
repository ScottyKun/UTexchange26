<div class="form-page">
  <div class="form-card">
    <h1 class="form-title"><i class="fa-solid fa-plus"></i> Déposer une annonce</h1>

    <div *ngIf="errorMsg" class="alert alert-error">{{ errorMsg }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label>Titre *</label>
        <input type="text" formControlName="title" placeholder="Ex: Vélo de ville en bon état"
               [class.is-invalid]="f['title'].invalid && f['title'].touched"/>
        <div class="field-error" *ngIf="f['title'].errors?.['required'] && f['title'].touched">Requis</div>
        <div class="field-error" *ngIf="f['title'].errors?.['minlength'] && f['title'].touched">5 caractères minimum</div>
      </div>

      <div class="form-group">
        <label>Description *</label>
        <textarea formControlName="description" rows="5" placeholder="Décrivez votre article…"
                  [class.is-invalid]="f['description'].invalid && f['description'].touched"></textarea>
        <div class="field-error" *ngIf="f['description'].errors?.['minlength'] && f['description'].touched">20 caractères minimum</div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Type *</label>
          <select formControlName="type">
            <option value="vente">Vente</option>
            <option value="location">Location</option>
            <option value="don">Don</option>
            <option value="troc">Troc</option>
          </select>
        </div>
        <div class="form-group">
          <label>Prix (€)</label>
          <input type="number" formControlName="price" min="0" placeholder="0"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Catégorie *</label>
          <select formControlName="categorie_id"
                  [class.is-invalid]="f['categorie_id'].invalid && f['categorie_id'].touched">
            <option [ngValue]="null">-- Choisir --</option>
            <option *ngFor="let c of categories" [value]="c.id">{{ c.nom }}</option>
          </select>
          <div class="field-error" *ngIf="f['categorie_id'].errors?.['required'] && f['categorie_id'].touched">Requis</div>
        </div>
        <div class="form-group">
          <label>Localisation</label>
          <input type="text" formControlName="location" placeholder="Ville / campus"/>
        </div>
      </div>

      <div class="form-group">
        <label>Photos (optionnel)</label>
        <input type="file" accept="image/*" multiple (change)="onFilesChange($event)"/>
        <p class="hint" *ngIf="selectedFiles.length > 0">{{ selectedFiles.length }} photo(s) sélectionnée(s)</p>
      </div>

      <div class="form-actions">
        <a routerLink="/annonces" class="btn-secondary">Annuler</a>
        <button type="submit" class="btn-primary" [disabled]="loading">
          <span *ngIf="loading"><i class="fa-solid fa-spinner fa-spin"></i> Publication…</span>
          <span *ngIf="!loading">Publier l'annonce</span>
        </button>
      </div>
    </form>
  </div>
</div>
