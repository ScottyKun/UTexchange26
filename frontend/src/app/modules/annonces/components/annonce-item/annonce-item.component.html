<a [routerLink]="['/annonces', annonce.id]" class="annonce-card">
  <div class="card-img-wrap">
    <img [src]="coverUrl" [alt]="annonce.title" class="card-img" loading="lazy"/>
    <span class="card-badge" [ngClass]="typeLabel.cls">{{ typeLabel.text }}</span>
    <button class="card-favori" (click)="onFavoriClick($event)"
            [class.is-favori]="isFavori"
            title="{{ isFavori ? 'Retirer des favoris' : 'Ajouter aux favoris' }}">
      <i [class]="isFavori ? 'fa-solid fa-heart' : 'fa-regular fa-heart'"></i>
    </button>
  </div>
  <div class="card-body">
    <p class="card-title">{{ annonce.title }}</p>
    <p class="card-price" *ngIf="!annonce.isFree && !annonce.isTroc">
      {{ annonce.price | number:'1.0-0' }}&nbsp;€
    </p>
    <p class="card-price free" *ngIf="annonce.isFree">Gratuit</p>
    <p class="card-price troc" *ngIf="annonce.isTroc">Troc</p>
    <p class="card-location"><i class="fa-solid fa-location-dot"></i> {{ annonce.location || 'Non précisé' }}</p>
  </div>
</a>
