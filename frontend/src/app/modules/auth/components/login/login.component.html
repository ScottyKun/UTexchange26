<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-text">UTex<span class="logo-accent">CHANGE</span></span>
    </div>
    <h1 class="auth-title">Connexion</h1>

    <div *ngIf="errorMsg" class="alert alert-error">
      <i class="fa-solid fa-circle-exclamation"></i> {{ errorMsg }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="prenom.nom@ut-xxx.fr"
          [class.is-invalid]="f['email'].invalid && f['email'].touched"
        />
        <div class="field-error" *ngIf="f['email'].errors?.['required'] && f['email'].touched">
          L'adresse e-mail est requise
        </div>
        <div class="field-error" *ngIf="f['email'].errors?.['email'] && f['email'].touched">
          Format d'e-mail invalide
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.is-invalid]="f['password'].invalid && f['password'].touched"
        />
        <div class="field-error" *ngIf="f['password'].errors?.['required'] && f['password'].touched">
          Le mot de passe est requis
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="loading"><i class="fa-solid fa-spinner fa-spin"></i> Connexion…</span>
        <span *ngIf="!loading">Se connecter</span>
      </button>
    </form>

    <p class="auth-footer">
      Pas encore de compte ?
      <a routerLink="/register">Créer un compte</a>
    </p>
  </div>
</div>
