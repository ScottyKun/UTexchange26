<div class="fil-page">
  <div *ngIf="loading" class="loader-wrap"><i class="fa-solid fa-spinner fa-spin fa-2x"></i></div>

  <ng-container *ngIf="conversation && !loading">

    <!-- Header conversation -->
    <div class="conv-header">
      <a routerLink="/conversations" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="header-info">
        <p class="header-partner">
          {{ currentUserId === conversation.acheteur_id ? conversation.vendeur_nom : conversation.acheteur_nom }}
        </p>
        <p class="header-annonce">
          <i class="fa-solid fa-tag"></i> {{ conversation.annonce_title }}
        </p>
      </div>
      <div class="header-actions">
        <span class="status-badge status-{{ conversation.status }}">{{ conversation.status }}</span>
        <button *ngIf="isVendeur() && conversation.isActive"
                class="btn-sm btn-danger" (click)="terminateConversation()">
          Terminer
        </button>
      </div>
    </div>

    <!-- Fil de messages -->
    <div class="messages-scroll">
      <app-message-item
        *ngFor="let m of messages"
        [message]="m"
        [isMine]="m.isFrom(currentUserId)">
      </app-message-item>

      <!-- Avis reçus dans la conv -->
      <div *ngIf="conversation.avis.length > 0" class="avis-section">
        <p class="avis-title"><i class="fa-solid fa-star"></i> Avis laissés dans cette conversation</p>
        <div *ngFor="let a of conversation.avis" class="avis-chip">
          {{ a.acheteur_nom }} → {{ a.vendeur_nom }} : {{ a.note }}/5 — {{ a.commentaire }}
        </div>
      </div>

      <div #messagesEnd></div>
    </div>

    <!-- Zone saisie -->
    <div class="input-area" *ngIf="conversation.isActive">
      <textarea [(ngModel)]="newMessage" rows="2" placeholder="Votre message…"
                (keydown.control.enter)="sendMessage()"></textarea>
      <button class="send-btn" (click)="sendMessage()" [disabled]="!newMessage.trim() || sending">
        <i [class]="sending ? 'fa-solid fa-spinner fa-spin' : 'fa-solid fa-paper-plane'"></i>
      </button>
    </div>

    <!-- CTA laisser un avis -->
    <div *ngIf="conversation.isTerminee && !hasMyAvis() && !isVendeur()" class="avis-cta">
      <button (click)="showAvisForm = !showAvisForm" class="btn-avis">
        <i class="fa-solid fa-star"></i> Laisser un avis
      </button>
      <div *ngIf="showAvisForm" class="avis-form">
        <label>Note</label>
        <div class="stars-input">
          <span *ngFor="let n of noteRange" (click)="avisForm.note = n"
                [class.active]="n <= avisForm.note" class="star">★</span>
        </div>
        <textarea [(ngModel)]="avisForm.commentaire" rows="3" placeholder="Votre commentaire…"></textarea>
        <button class="btn-sm btn-primary" (click)="submitAvis()">Envoyer</button>
      </div>
    </div>

  </ng-container>
</div>
